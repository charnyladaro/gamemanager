<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GameManager</title>
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
    <!-- Titlebar -->
    <div class="titlebar">
        <div class="titlebar-title">GameManager Admin Dashboard</div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" onclick="minimizeWindow()">_</button>
            <button class="titlebar-btn" onclick="maximizeWindow()">□</button>
            <button class="titlebar-btn close" onclick="closeWindow()">×</button>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Admin Dashboard</h1>
                <p>Sign in to manage GameManager</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        class="form-input"
                        id="username"
                        required
                        autocomplete="username"
                        placeholder="Enter your username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        class="form-input"
                        id="password"
                        required
                        autocomplete="current-password"
                        placeholder="Enter your password"
                    >
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div style="margin-top: 20px; padding: 12px; background-color: rgba(37, 99, 235, 0.1); border-radius: 6px; border-left: 3px solid #2563eb;">
                <p style="font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Default credentials:</p>
                <p style="font-size: 12px; color: #cbd5e1;">Username: <strong>admin</strong> | Password: <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script src="../components/api.js"></script>
    <script src="../components/ui.js"></script>
    <script>
        const form = document.getElementById('loginForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                showLoading('Signing in...');

                const response = await API.login(username, password);

                // Verify the user is an admin
                const currentUser = await API.getCurrentUser();

                if (!currentUser.is_admin) {
                    hideLoading();
                    showToast('Access denied: Admin privileges required', 'error', 5000);
                    API.clearToken();
                    return;
                }

                hideLoading();
                showToast('Login successful!', 'success');

                // Navigate to dashboard
                setTimeout(() => {
                    navigateTo('dashboard.html');
                }, 500);

            } catch (error) {
                hideLoading();
                showToast(error.message || 'Login failed. Please check your credentials.', 'error');
                console.error('Login error:', error);
            }
        });

        // Clear any existing token on login page
        localStorage.removeItem('admin_token');
    </script>
</body>
</html>
